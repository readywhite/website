name: Ready White Systems Check

on:
  schedule:
    # 00:00, 12:00, and 18:00 EST (UTC-5) daily.
    - cron: "0 5,17,23 * * *"
  workflow_dispatch:

jobs:
  systems-check:
    runs-on: ubuntu-latest
    env:
      READYWHITE_RAILWAY_BASE_URL: ${{ secrets.READYWHITE_RAILWAY_BASE_URL }}
      READYWHITE_BASE_URL: ${{ secrets.READYWHITE_BASE_URL }}
      GHL_PRIVATE_INTEGRATION_TOKEN: ${{ secrets.GHL_PRIVATE_INTEGRATION_TOKEN }}
      GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run audit:ops
      - run: npm run audit:seo
      - name: Live GHL smoke test
        if: ${{ env.READYWHITE_RAILWAY_BASE_URL != '' || env.READYWHITE_BASE_URL != '' }}
        run: npm run smoke:ghl
      - name: Generate GHL setup report
        if: ${{ env.GHL_PRIVATE_INTEGRATION_TOKEN != '' && env.GHL_LOCATION_ID != '' }}
        env:
          GHL_REPORT_OUTPUT: reports/ghl-setup-report.md
        run: npm run report:ghl
      - name: Upload GHL setup report
        if: ${{ env.GHL_PRIVATE_INTEGRATION_TOKEN != '' && env.GHL_LOCATION_ID != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ghl-setup-report
          path: reports/ghl-setup-report.md
